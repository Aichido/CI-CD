<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Service — Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }

        .logo h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: rgba(255,255,255,0.45);
            font-size: 13px;
            margin-top: 4px;
        }

        .service-badge {
            display: inline-block;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            color: #a5b4fc;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .redirect-notice {
            display: none;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #a5b4fc;
        }

        .redirect-notice.visible { display: flex; align-items: center; gap: 8px; }
        .redirect-notice svg { flex-shrink: 0; }

        label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .field { margin-bottom: 20px; }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            transition: border-color 0.2s, background 0.2s;
            outline: none;
        }

        input[type="email"]:focus, input[type="password"]:focus {
            border-color: #667eea;
            background: rgba(255,255,255,0.1);
        }

        input::placeholder { color: rgba(255,255,255,0.25); }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        button[type="submit"]:hover { opacity: 0.9; }
        button[type="submit"]:active { transform: scale(0.98); }
        button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .alert {
            display: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        .alert.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #86efac;
        }

        .alert.visible { display: block; }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .security-note {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.3);
            font-size: 11px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <h1>Auth Service</h1>
            <p>Service d'authentification sécurisé</p>
            <span class="service-badge">Microservice · TP-5</span>
        </div>

        <!-- Bandeau si redirection depuis une app cliente -->
        <div class="redirect-notice" id="redirectNotice">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/>
            </svg>
            <span id="redirectNoticeText">Connexion requise par une application</span>
        </div>

        <div class="alert" id="alert"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="field">
                <label for="email">Adresse email</label>
                <input type="email" id="email" placeholder="vous@exemple.com" required autocomplete="email">
            </div>
            <div class="field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" id="submitBtn">Se connecter</button>
        </form>

        <div class="security-note">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            Protocole HMAC-SHA256 — le mot de passe ne transite jamais sur le réseau
        </div>
    </div>
</div>

<script th:inline="javascript">
    const REDIRECT_URI = /*[[${redirectUri}]]*/ '';

    // Afficher le bandeau si on vient d'une app cliente
    if (REDIRECT_URI) {
        const notice = document.getElementById('redirectNotice');
        notice.classList.add('visible');
        try {
            const host = new URL(REDIRECT_URI).hostname;
            document.getElementById('redirectNoticeText').textContent =
                `Connexion demandée par : ${host}`;
        } catch(e) {}
    }

    async function computeHmac(password, message) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            'raw',
            enc.encode(password),
            { name: 'HMAC', hash: 'SHA-256' },
            false,
            ['sign']
        );
        const signature = await crypto.subtle.sign('HMAC', keyMaterial, enc.encode(message));
        return btoa(String.fromCharCode(...new Uint8Array(signature)));
    }

    function showAlert(message, type) {
        const alert = document.getElementById('alert');
        alert.textContent = message;
        alert.className = `alert ${type} visible`;
    }

    async function handleLogin(event) {
        event.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submitBtn');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Connexion en cours…';
        document.getElementById('alert').className = 'alert';

        try {
            const nonce = crypto.randomUUID();
            const timestamp = Math.floor(Date.now() / 1000);
            const message = `${email}:${nonce}:${timestamp}`;
            const hmac = await computeHmac(password, message);

            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, nonce, timestamp, hmac })
            });

            const data = await response.json();

            if (!response.ok) {
                const msg = data.message || data.error || 'Authentification échouée';
                showAlert(msg, 'error');
                return;
            }

            const token = data.accessToken;

            if (REDIRECT_URI) {
                // Mode SSO : rediriger vers l'application cliente avec le token
                const separator = REDIRECT_URI.includes('?') ? '&' : '?';
                showAlert('Connexion réussie ! Redirection…', 'success');
                setTimeout(() => {
                    window.location.href = `${REDIRECT_URI}${separator}token=${encodeURIComponent(token)}`;
                }, 500);
            } else {
                // Mode standalone : stocker le token et afficher le succès
                localStorage.setItem('auth_token', token);
                showAlert('Connexion réussie ! Token stocké en localStorage.', 'success');
            }
        } catch (err) {
            showAlert('Erreur réseau. Vérifiez que le service est démarré.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Se connecter';
        }
    }
</script>
</body>
</html>
